services:
  - type: web
    name: symfony-ai-demo
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Wkleisz tutaj link z Neon.tech w panelu Render
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    buildCommand: "php bin/console ai:store:setup ai.store.postgres.symfony_blog --force && php bin/console ai:store:index blog -vv"
